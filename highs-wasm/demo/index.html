<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiGHS WASM Solver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; margin: 0 auto; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; }
    .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
    #fileInput { flex: 1; }
    button { padding: 0.5rem 1.5rem; font-size: 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin: 1rem 0; font-weight: bold; }
    #logOutput {
      background: #1e1e1e; color: #d4d4d4; padding: 1rem;
      font-family: monospace; font-size: 0.85rem;
      white-space: pre; overflow: auto;
      max-height: 80vh; min-height: 300px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>HiGHS LP/MIP Solver</h1>
  <div class="controls">
    <input type="file" id="fileInput" accept=".mps,.lp,.MPS,.LP">
    <button id="solveBtn" disabled>Solve</button>
  </div>
  <div id="status">Loading WASM module...</div>
  <pre id="logOutput"></pre>

  <script>
    const worker = new Worker('worker.js');
    const solveBtn = document.getElementById('solveBtn');
    const status = document.getElementById('status');
    const logOutput = document.getElementById('logOutput');

    worker.onmessage = function(e) {
      const msg = e.data;
      switch (msg.type) {
        case 'ready':
          solveBtn.disabled = false;
          status.textContent = 'Ready. Upload an .mps or .lp file.';
          break;
        case 'log':
          logOutput.textContent += msg.line + '\n';
          logOutput.scrollTop = logOutput.scrollHeight;
          break;
        case 'done':
          solveBtn.disabled = false;
          if (msg.status === 0) {
            status.textContent = 'Solved! Objective value: ' + msg.objective;
          } else {
            status.textContent = 'Solver returned status ' + msg.status;
          }
          break;
        case 'error':
          status.textContent = msg.message;
          break;
      }
    };

    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) status.textContent = 'File loaded: ' + file.name;
    });

    solveBtn.addEventListener('click', async () => {
      const file = document.getElementById('fileInput').files[0];
      if (!file) { alert('Please select a file first.'); return; }

      const content = await file.text();
      const ext = file.name.split('.').pop().toLowerCase();
      const filename = '/model.' + (ext === 'lp' ? 'lp' : 'mps');

      logOutput.textContent = '';
      status.textContent = 'Solving...';
      solveBtn.disabled = true;

      worker.postMessage({type: 'solve', content, filename});
    });
  </script>
</body>
</html>
